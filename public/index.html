<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatCore</title>
    <style>
      :root {
        --bg: #ececef;
        --panel: #f9f9fb;
        --line: #dde1e6;
        --text: #26333a;
        --muted: #78858e;
        --brand: #0d5d5f;
        --brand-2: #0b4a50;
        --brand-soft: #e7f5f3;
        --message-in: #ffffff;
        --message-out: #edf2f4;
        --shadow: 0 14px 36px rgba(20, 35, 44, 0.12);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, 'Segoe UI', Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .app {
        min-height: 100vh;
        padding: 1.2rem;
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 1rem;
        transition: grid-template-columns .2s ease;
      }

      .app.sidebar-hidden {
        grid-template-columns: 72px 1fr;
      }

      .sidebar {
        display: grid;
        grid-template-columns: 72px 1fr;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .rail {
        background: #f3f4f6;
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1rem .55rem;
        gap: .8rem;
      }

      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 999px;
        background: linear-gradient(145deg, #f6d4b2, #d59a66);
        border: 2px solid #fff;
        box-shadow: 0 4px 10px rgba(0,0,0,.12);
      }

      .rail-btn {
        width: 36px;
        height: 36px;
        border: 0;
        border-radius: 10px;
        background: linear-gradient(145deg, var(--brand), var(--brand-2));
        color: #fff;
        cursor: pointer;
      }

      .side-content {
        background: linear-gradient(180deg, #0f6366, #0d4d56);
        color: #eaf4f5;
        padding: .8rem;
        display: flex;
        flex-direction: column;
      }

      .app.sidebar-hidden .side-content {
        display: none;
      }

      .side-top {
        display: flex;
        align-items: center;
        gap: .5rem;
        margin-bottom: .8rem;
      }

      .icon-pill {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        border: 0;
        background: rgba(255,255,255,.14);
        color: #fff;
      }

      .chat-list {
        list-style: none;
        margin: .5rem 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: .34rem;
        overflow: auto;
      }

      .chat-list button {
        width: 100%;
        text-align: left;
        border: 1px solid rgba(255,255,255,.18);
        border-radius: 10px;
        background: transparent;
        color: #e7f6f4;
        padding: .55rem .55rem;
        cursor: pointer;
      }

      .chat-list button:hover { background: rgba(255,255,255,.1); }
      .chat-list button.active {
        background: rgba(255,255,255,.2);
        border-color: rgba(255,255,255,.35);
      }

      .main {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header {
        background: #fff;
        border-bottom: 1px solid var(--line);
        padding: .95rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: .7rem;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: .6rem;
      }

      .header h2 { margin: 0; font-size: 1.9rem; font-weight: 700; }
      .header p { margin: .2rem 0 0; color: var(--muted); font-size: .9rem; }

      .btn {
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: .62rem .92rem;
        cursor: pointer;
        font-weight: 600;
      }

      .btn-primary {
        background: linear-gradient(145deg, var(--brand), var(--brand-2));
        border: 0;
        color: #fff;
      }

      .btn-secondary {
        background: #fff;
        color: var(--brand-2);
      }

      .body {
        flex: 1;
        padding: .9rem 1rem;
        background: #f7f8fa;
        display: flex;
        flex-direction: column;
        gap: .7rem;
      }

      .messages {
        list-style: none;
        margin: 0;
        padding: .8rem;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #f6f7f9;
        min-height: 58vh;
        max-height: 58vh;
        overflow-y: auto;
      }

      .message {
        max-width: 66%;
        background: var(--message-in);
        border: 1px solid #d7dee4;
        border-radius: 10px;
        margin-bottom: .52rem;
        padding: .6rem .7rem;
        box-shadow: 0 4px 10px rgba(0,0,0,.04);
      }

      .message.outgoing {
        margin-left: auto;
        background: var(--message-out);
      }

      .meta { font-size: .72rem; color: var(--muted); margin-top: .25rem; }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: .5rem;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: .42rem;
      }

      .composer input {
        border: 0;
        outline: none;
        padding: .62rem .7rem;
        font-size: 1rem;
      }

      .toast {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        background: #1a4a3f;
        color: #fff;
        padding: .62rem .8rem;
        border-radius: 10px;
        opacity: 0;
        transform: translateY(8px);
        transition: .2s ease;
      }

      .toast.show { opacity: 1; transform: translateY(0); }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(14, 24, 31, 0.45);
      }

      .modal-backdrop.show { display: flex; }

      .modal {
        width: min(500px, 95vw);
        background: #fff;
        border-radius: 14px;
        border: 1px solid var(--line);
        overflow: hidden;
      }

      .modal header {
        background: linear-gradient(145deg, var(--brand), var(--brand-2));
        color: #fff;
        padding: .75rem .9rem;
        display: flex;
        justify-content: space-between;
      }

      .modal-content { padding: .9rem; background: #f8f9fb; }
      .actions { display: flex; justify-content: end; gap: .45rem; }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
      }

      @media (max-width: 980px) {
        .app { grid-template-columns: 1fr; }
        .app.sidebar-hidden { grid-template-columns: 1fr; }
        .sidebar { grid-template-columns: 72px 1fr; }
        .app.sidebar-hidden .sidebar { display: none; }
        .messages { min-height: 44vh; max-height: 44vh; }
      }
    </style>
  </head>
  <body>
    <div class="app" id="app-root">
      <aside class="sidebar">
        <div class="rail">
          <div class="avatar" aria-hidden="true"></div>
          <button id="toggle-sidebar-rail" class="rail-btn" title="Ocultar sidebar">☰</button>
          <button class="rail-btn" aria-hidden="true">💬</button>
        </div>

        <div class="side-content">
          <div class="side-top">
            <div class="avatar" style="width:34px;height:34px;"></div>
            <button class="icon-pill">✉</button>
          </div>

          <label for="username" style="color:#cae4e1;">Tu usuario</label>
          <input id="username" placeholder="ej. ana" />
          <button id="refresh-chats" class="btn btn-secondary" type="button">Actualizar</button>

          <label for="search-chats" style="margin-top:.6rem;color:#cae4e1;">Buscar chat</label>
          <input id="search-chats" placeholder="Buscar..." />

          <ul id="chat-list" class="chat-list"></ul>
          <p id="empty-chat-list" style="color:#cae4e1; font-size:.82rem; margin-top:.5rem;">No hay chats todavía.</p>
        </div>
      </aside>

      <main class="main">
        <header class="header">
          <div class="header-left">
            <button id="toggle-sidebar-main" class="btn btn-secondary" type="button">☰</button>
            <div class="avatar" style="width:38px;height:38px;"></div>
            <div>
              <h2 id="chat-title">Project Team</h2>
              <p id="active-chat">Selecciona un chat para comenzar</p>
            </div>
          </div>

          <button id="open-create-chat-modal" class="btn btn-primary" type="button">Create Chat</button>
        </header>

        <section class="body">
          <ul id="messages" class="messages" aria-live="polite"></ul>

          <form id="message-form" class="composer">
            <label class="sr-only" for="message-input">Escribe un mensaje</label>
            <input id="message-input" maxlength="1000" placeholder="Type a message..." required />
            <button type="submit" class="btn btn-primary">➤</button>
          </form>
        </section>
      </main>
    </div>

    <div id="create-chat-modal" class="modal-backdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <header>
          <h3 id="modal-title" style="margin:0;">Crear nuevo chat</h3>
          <button id="close-modal" class="btn btn-secondary" type="button">✕</button>
        </header>
        <div class="modal-content">
          <label for="chat-name">Nombre del chat</label>
          <input id="chat-name" placeholder="Marketing Group" />

          <label for="chat-users">Participantes (coma)</label>
          <input id="chat-users" placeholder="ana, luis, maria" />

          <div class="actions">
            <button id="cancel-create-chat" class="btn btn-secondary" type="button">Cancelar</button>
            <button id="create-chat" class="btn btn-primary" type="button">Crear</button>
          </div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = window.io ? io() : { emit() {}, on() {} };
      const appRoot = document.getElementById('app-root');
      const usernameInput = document.getElementById('username');
      const chatList = document.getElementById('chat-list');
      const searchChatsInput = document.getElementById('search-chats');
      const emptyChatList = document.getElementById('empty-chat-list');
      const messagesEl = document.getElementById('messages');
      const activeChatText = document.getElementById('active-chat');
      const chatTitle = document.getElementById('chat-title');
      const msgForm = document.getElementById('message-form');
      const msgInput = document.getElementById('message-input');
      const chatNameInput = document.getElementById('chat-name');
      const chatUsersInput = document.getElementById('chat-users');
      const createModal = document.getElementById('create-chat-modal');
      const toast = document.getElementById('toast');
      let activeChatId = null;
      let chatsCache = [];

      function normalize(name) {
        return (name || '').trim().replace(/\s+/g, '_').toLowerCase();
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
      }

      function toggleSidebar() {
        appRoot.classList.toggle('sidebar-hidden');
      }

      function markSelectedChat(chatId) {
        chatList.querySelectorAll('button').forEach((btn) => {
          btn.classList.toggle('active', Number(btn.dataset.chatId) === Number(chatId));
        });
      }

      function openModal() {
        createModal.classList.add('show');
        createModal.setAttribute('aria-hidden', 'false');
        chatNameInput.focus();
      }

      function closeModal() {
        createModal.classList.remove('show');
        createModal.setAttribute('aria-hidden', 'true');
      }

      function renderChatList(chats) {
        chatList.innerHTML = '';

        if (!Array.isArray(chats) || chats.length === 0) {
          emptyChatList.style.display = 'block';
          return;
        }

        emptyChatList.style.display = 'none';

        chats.forEach((chat) => {
          const li = document.createElement('li');
          const button = document.createElement('button');
          button.type = 'button';
          button.dataset.chatId = chat.id;
          button.textContent = chat.name;
          button.addEventListener('click', () => openChat(chat.id, chat.name));
          li.appendChild(button);
          chatList.appendChild(li);
        });

        if (activeChatId) markSelectedChat(activeChatId);
      }

      async function loadChats() {
        const username = normalize(usernameInput.value);
        if (!username) {
          showToast('Primero escribe tu usuario.');
          return;
        }

        const res = await fetch(`/api/chats?username=${encodeURIComponent(username)}`);
        const chats = await res.json();
        chatsCache = Array.isArray(chats) ? chats : [];
        renderChatList(chatsCache);
      }

      async function openChat(chatId, chatName) {
        activeChatId = chatId;
        chatTitle.textContent = chatName;
        activeChatText.textContent = 'Active now';
        markSelectedChat(chatId);
        socket.emit('join_chat', { chatId });

        const res = await fetch(`/api/chats/${chatId}/messages`);
        const messages = await res.json();
        messagesEl.innerHTML = '';

        if (!Array.isArray(messages) || messages.length === 0) {
          messagesEl.innerHTML = '<li class="message">Aún no hay mensajes en este chat.</li>';
          return;
        }

        messages.forEach(renderMessage);
      }

      function renderMessage(message) {
        const li = document.createElement('li');
        const self = normalize(usernameInput.value);
        li.className = `message ${message.sender.username === self ? 'outgoing' : ''}`;
        li.innerHTML = `<strong>${message.sender.username}</strong>: ${message.content}<div class="meta">${new Date(message.createdAt).toLocaleString()}</div>`;
        messagesEl.appendChild(li);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function createChat() {
        const name = chatNameInput.value.trim();
        const creator = normalize(usernameInput.value);
        const extra = chatUsersInput.value.split(',').map(normalize).filter(Boolean);
        const participants = [...new Set([creator, ...extra])];

        if (!name) {
          showToast('El chat necesita un nombre.');
          return;
        }

        const res = await fetch('/api/chats', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, participants })
        });

        if (!res.ok) {
          showToast('No se pudo crear el chat.');
          return;
        }

        chatNameInput.value = '';
        chatUsersInput.value = '';
        closeModal();
        showToast('Chat creado correctamente.');
        await loadChats();
      }

      msgForm.addEventListener('submit', (e) => {
        e.preventDefault();

        if (!activeChatId) {
          showToast('Selecciona un chat antes de enviar.');
          return;
        }

        socket.emit('send_message', {
          chatId: activeChatId,
          sender: normalize(usernameInput.value),
          content: msgInput.value
        });

        msgInput.value = '';
      });

      socket.on('new_message', (message) => {
        if (Number(message.chatId) === Number(activeChatId)) renderMessage(message);
      });

      socket.on('chat_error', (err) => {
        showToast(err.message || 'Error en chat');
      });

      searchChatsInput.addEventListener('input', () => {
        const term = searchChatsInput.value.trim().toLowerCase();
        if (!term) return renderChatList(chatsCache);
        renderChatList(chatsCache.filter((chat) => chat.name.toLowerCase().includes(term)));
      });

      usernameInput.addEventListener('change', loadChats);
      document.getElementById('refresh-chats').addEventListener('click', loadChats);
      document.getElementById('create-chat').addEventListener('click', createChat);
      document.getElementById('open-create-chat-modal').addEventListener('click', openModal);
      document.getElementById('close-modal').addEventListener('click', closeModal);
      document.getElementById('cancel-create-chat').addEventListener('click', closeModal);
      document.getElementById('toggle-sidebar-main').addEventListener('click', toggleSidebar);
      document.getElementById('toggle-sidebar-rail').addEventListener('click', toggleSidebar);

      createModal.addEventListener('click', (event) => {
        if (event.target === createModal) closeModal();
      });
    </script>
  </body>
</html>
