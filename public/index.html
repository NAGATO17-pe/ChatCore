<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatCore</title>
    <style>
      :root {
        --bg: #ebedef;
        --panel: #fdfdfd;
        --line: #d8dee4;
        --text: #25333d;
        --muted: #71808c;
        --brand: #0c5a5c;
        --brand-2: #0a484e;
        --bubble-in: #ffffff;
        --bubble-out: #edf2f5;
        --shadow: 0 16px 34px rgba(20, 30, 40, 0.12);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, 'Segoe UI', Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .layout {
        min-height: 100vh;
        padding: 1rem;
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 1rem;
        transition: grid-template-columns .2s ease;
      }

      .layout.sidebar-collapsed {
        grid-template-columns: 74px 1fr;
      }

      .sidebar {
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
        display: grid;
        grid-template-columns: 74px 1fr;
      }

      .rail {
        background: #f2f4f7;
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: .85rem .5rem;
        gap: .65rem;
      }

      .avatar {
        width: 42px;
        height: 42px;
        border-radius: 999px;
        background: linear-gradient(145deg, #facfa7, #d89f70);
        border: 2px solid #fff;
      }

      .rail-btn,
      .btn {
        border: 1px solid var(--line);
        border-radius: 9px;
        cursor: pointer;
      }

      .rail-btn {
        width: 38px;
        height: 38px;
        background: linear-gradient(145deg, var(--brand), var(--brand-2));
        color: #fff;
        border: 0;
      }

      .sidebar-content {
        background: linear-gradient(180deg, #0f6164, #0b4a51);
        color: #eaf5f6;
        padding: .8rem;
        display: flex;
        flex-direction: column;
        gap: .55rem;
      }

      .layout.sidebar-collapsed .sidebar-content { display: none; }

      label {
        font-size: .83rem;
        font-weight: 600;
      }

      input,
      .btn {
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid rgba(255,255,255,.25);
        border-radius: 9px;
        background: rgba(255,255,255,.15);
        color: #fff;
        padding: .56rem .62rem;
      }

      input::placeholder { color: rgba(255,255,255,.75); }

      .btn {
        padding: .58rem .75rem;
        font-weight: 600;
      }

      .btn-ghost {
        background: rgba(255,255,255,.18);
        color: #fff;
        border-color: rgba(255,255,255,.25);
      }

      .chat-list {
        list-style: none;
        margin: .4rem 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: .35rem;
        overflow-y: auto;
      }

      .chat-list button {
        width: 100%;
        text-align: left;
        border: 1px solid rgba(255,255,255,.2);
        border-radius: 9px;
        background: transparent;
        color: #e8f4f4;
        padding: .52rem .55rem;
        cursor: pointer;
      }

      .chat-list button:hover { background: rgba(255,255,255,.13); }
      .chat-list button.active {
        background: rgba(255,255,255,.24);
        border-color: rgba(255,255,255,.35);
      }

      .main {
        border-radius: 14px;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .top {
        padding: .9rem 1rem;
        border-bottom: 1px solid var(--line);
        background: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: .75rem;
      }

      .top-left {
        display: flex;
        align-items: center;
        gap: .55rem;
      }

      .top h1 {
        margin: 0;
        font-size: 1.7rem;
      }

      .top p {
        margin: .2rem 0 0;
        color: var(--muted);
        font-size: .9rem;
      }

      .btn-main {
        border: 0;
        color: #fff;
        background: linear-gradient(145deg, var(--brand), var(--brand-2));
        padding: .63rem .92rem;
      }

      .chat-body {
        padding: .85rem 1rem;
        background: #f7f8fa;
        display: flex;
        flex-direction: column;
        gap: .65rem;
        height: 100%;
      }

      .messages {
        list-style: none;
        margin: 0;
        padding: .82rem;
        border: 1px solid var(--line);
        border-radius: 11px;
        min-height: 60vh;
        max-height: 60vh;
        overflow-y: auto;
        background: #f4f6f8;
      }

      .message {
        max-width: 70%;
        border: 1px solid #d4dce3;
        border-radius: 10px;
        background: var(--bubble-in);
        margin-bottom: .55rem;
        padding: .56rem .65rem;
        box-shadow: 0 4px 8px rgba(0,0,0,.04);
      }

      .message.outgoing {
        margin-left: auto;
        background: var(--bubble-out);
      }

      .meta {
        margin-top: .22rem;
        color: var(--muted);
        font-size: .71rem;
      }

      .composer {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: .45rem;
        padding: .38rem;
      }

      .composer input {
        color: var(--text);
        background: transparent;
        border: 0;
      }

      .composer input::placeholder { color: var(--muted); }

      .toast {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        background: #153f35;
        color: #fff;
        border-radius: 10px;
        padding: .6rem .8rem;
        opacity: 0;
        transform: translateY(8px);
        transition: .2s ease;
      }

      .toast.show { opacity: 1; transform: translateY(0); }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(18, 28, 35, 0.42);
      }

      .modal-backdrop.show { display: flex; }

      .modal {
        width: min(500px, 94vw);
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }

      .modal header {
        padding: .75rem .9rem;
        color: #fff;
        background: linear-gradient(145deg, var(--brand), var(--brand-2));
        display: flex;
        justify-content: space-between;
      }

      .modal-content { padding: .9rem; background: #f7f8fa; }
      .modal-content input {
        color: var(--text);
        border: 1px solid var(--line);
        background: #fff;
      }
      .modal-content input::placeholder { color: var(--muted); }
      .actions { display: flex; justify-content: end; gap: .5rem; }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
      }

      @media (max-width: 960px) {
        .layout { grid-template-columns: 1fr; }
        .layout.sidebar-collapsed { grid-template-columns: 1fr; }
        .layout.sidebar-collapsed .sidebar { display: none; }
        .messages { min-height: 44vh; max-height: 44vh; }
      }
    </style>
  </head>
  <body>
    <div id="layout" class="layout">
      <aside class="sidebar">
        <div class="rail">
          <div class="avatar" aria-hidden="true"></div>
          <button id="toggle-sidebar-left" class="rail-btn" type="button" title="Ocultar panel">☰</button>
          <button class="rail-btn" type="button" aria-hidden="true">💬</button>
        </div>

        <div class="sidebar-content">
          <label for="username">Tu usuario</label>
          <input id="username" placeholder="ej. ana" />
          <button id="refresh-chats" class="btn btn-ghost" type="button">Actualizar chats</button>

          <label for="search-chats">Buscar chat</label>
          <input id="search-chats" placeholder="Buscar..." />

          <ul id="chat-list" class="chat-list"></ul>
          <p id="empty-chat-list" style="margin:0;color:#d2e6e7;font-size:.82rem;">No hay chats todavía.</p>
        </div>
      </aside>

      <main class="main">
        <header class="top">
          <div class="top-left">
            <button id="toggle-sidebar-top" class="btn" type="button">☰</button>
            <div class="avatar" style="width:38px;height:38px;"></div>
            <div>
              <h1 id="chat-title">Project Team</h1>
              <p id="active-chat">Selecciona un chat para comenzar</p>
            </div>
          </div>

          <button id="open-create-chat-modal" class="btn btn-main" type="button">Create Chat</button>
        </header>

        <section class="chat-body">
          <ul id="messages" class="messages" aria-live="polite"></ul>

          <form id="message-form" class="composer">
            <label class="sr-only" for="message-input">Escribe un mensaje</label>
            <input id="message-input" maxlength="1000" placeholder="Type a message..." required />
            <button type="submit" class="btn btn-main">➤</button>
          </form>
        </section>
      </main>
    </div>

    <div id="create-chat-modal" class="modal-backdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <header>
          <h3 id="modal-title" style="margin:0;">Crear nuevo chat</h3>
          <button id="close-modal" class="btn" type="button">✕</button>
        </header>

        <div class="modal-content">
          <label for="chat-name" style="display:block;margin-bottom:.3rem;color:var(--muted);">Nombre del chat</label>
          <input id="chat-name" placeholder="Marketing Group" />

          <label for="chat-users" style="display:block;margin:.5rem 0 .3rem;color:var(--muted);">Participantes (coma)</label>
          <input id="chat-users" placeholder="ana, luis, maria" />

          <div class="actions" style="margin-top:.6rem;">
            <button id="cancel-create-chat" class="btn" type="button">Cancelar</button>
            <button id="create-chat" class="btn btn-main" type="button">Crear</button>
          </div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = window.io ? io() : { emit() {}, on() {} };
      const layout = document.getElementById('layout');
      const usernameInput = document.getElementById('username');
      const searchChatsInput = document.getElementById('search-chats');
      const chatList = document.getElementById('chat-list');
      const emptyChatList = document.getElementById('empty-chat-list');
      const messagesEl = document.getElementById('messages');
      const activeChatText = document.getElementById('active-chat');
      const chatTitle = document.getElementById('chat-title');
      const msgForm = document.getElementById('message-form');
      const msgInput = document.getElementById('message-input');
      const chatNameInput = document.getElementById('chat-name');
      const chatUsersInput = document.getElementById('chat-users');
      const createModal = document.getElementById('create-chat-modal');
      const toast = document.getElementById('toast');
      let activeChatId = null;
      let chatsCache = [];

      function normalize(name) {
        return (name || '').trim().replace(/\s+/g, '_').toLowerCase();
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
      }

      function toggleSidebar() {
        layout.classList.toggle('sidebar-collapsed');
      }

      function openModal() {
        createModal.classList.add('show');
        createModal.setAttribute('aria-hidden', 'false');
      }

      function closeModal() {
        createModal.classList.remove('show');
        createModal.setAttribute('aria-hidden', 'true');
      }

      function markSelected(chatId) {
        chatList.querySelectorAll('button').forEach((btn) => {
          btn.classList.toggle('active', Number(btn.dataset.chatId) === Number(chatId));
        });
      }

      function renderChatList(chats) {
        chatList.innerHTML = '';

        if (!Array.isArray(chats) || chats.length === 0) {
          emptyChatList.style.display = 'block';
          return;
        }

        emptyChatList.style.display = 'none';

        chats.forEach((chat) => {
          const li = document.createElement('li');
          const button = document.createElement('button');
          button.type = 'button';
          button.dataset.chatId = chat.id;
          button.textContent = chat.name;
          button.addEventListener('click', () => openChat(chat.id, chat.name));
          li.appendChild(button);
          chatList.appendChild(li);
        });

        if (activeChatId) markSelected(activeChatId);
      }

      async function loadChats() {
        const username = normalize(usernameInput.value);
        if (!username) {
          showToast('Primero escribe tu usuario.');
          return;
        }

        const res = await fetch(`/api/chats?username=${encodeURIComponent(username)}`);
        const chats = await res.json();
        chatsCache = Array.isArray(chats) ? chats : [];
        renderChatList(chatsCache);
      }

      async function openChat(chatId, chatName) {
        activeChatId = chatId;
        chatTitle.textContent = chatName;
        activeChatText.textContent = 'Active now';
        markSelected(chatId);
        socket.emit('join_chat', { chatId });

        const res = await fetch(`/api/chats/${chatId}/messages`);
        const messages = await res.json();
        messagesEl.innerHTML = '';

        if (!Array.isArray(messages) || messages.length === 0) {
          messagesEl.innerHTML = '<li class="message">Aún no hay mensajes en este chat.</li>';
          return;
        }

        messages.forEach(renderMessage);
      }

      function renderMessage(message) {
        const li = document.createElement('li');
        const self = normalize(usernameInput.value);
        li.className = `message ${message.sender.username === self ? 'outgoing' : ''}`;
        li.innerHTML = `<strong>${message.sender.username}</strong>: ${message.content}<div class="meta">${new Date(message.createdAt).toLocaleString()}</div>`;
        messagesEl.appendChild(li);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function createChat() {
        const name = chatNameInput.value.trim();
        const creator = normalize(usernameInput.value);
        const extra = chatUsersInput.value.split(',').map(normalize).filter(Boolean);
        const participants = [...new Set([creator, ...extra])];

        if (!name) {
          showToast('El chat necesita un nombre.');
          return;
        }

        const res = await fetch('/api/chats', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, participants })
        });

        if (!res.ok) {
          showToast('No se pudo crear el chat.');
          return;
        }

        chatNameInput.value = '';
        chatUsersInput.value = '';
        closeModal();
        showToast('Chat creado correctamente.');
        await loadChats();
      }

      msgForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!activeChatId) {
          showToast('Selecciona un chat antes de enviar.');
          return;
        }

        socket.emit('send_message', {
          chatId: activeChatId,
          sender: normalize(usernameInput.value),
          content: msgInput.value
        });

        msgInput.value = '';
      });

      socket.on('new_message', (message) => {
        if (Number(message.chatId) === Number(activeChatId)) renderMessage(message);
      });

      socket.on('chat_error', (err) => {
        showToast(err.message || 'Error en chat');
      });

      searchChatsInput.addEventListener('input', () => {
        const term = searchChatsInput.value.trim().toLowerCase();
        if (!term) return renderChatList(chatsCache);
        renderChatList(chatsCache.filter((chat) => chat.name.toLowerCase().includes(term)));
      });

      usernameInput.addEventListener('change', loadChats);
      document.getElementById('refresh-chats').addEventListener('click', loadChats);
      document.getElementById('open-create-chat-modal').addEventListener('click', openModal);
      document.getElementById('create-chat').addEventListener('click', createChat);
      document.getElementById('close-modal').addEventListener('click', closeModal);
      document.getElementById('cancel-create-chat').addEventListener('click', closeModal);
      document.getElementById('toggle-sidebar-top').addEventListener('click', toggleSidebar);
      document.getElementById('toggle-sidebar-left').addEventListener('click', toggleSidebar);

      createModal.addEventListener('click', (event) => {
        if (event.target === createModal) closeModal();
      });
    </script>
  </body>
</html>
